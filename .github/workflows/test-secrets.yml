name: Test Secrets Configuration

on:
  workflow_dispatch:

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check which secrets are configured
        run: |
          echo "=== Checking GitHub Secrets ==="
          echo "Note: Values are hidden for security"
          echo ""
          
          if [ -n "${{ secrets.DB_HOST }}" ]; then
            echo "✅ DB_HOST is SET"
            echo "   Length: ${#DB_HOST_VALUE} characters" 
          else
            echo "❌ DB_HOST is NOT SET"
          fi
          
          if [ -n "${{ secrets.DB_USER }}" ]; then
            echo "✅ DB_USER is SET"
          else
            echo "❌ DB_USER is NOT SET"
          fi
          
          if [ -n "${{ secrets.DB_PW }}" ]; then
            echo "✅ DB_PW is SET"
          else
            echo "❌ DB_PW is NOT SET"
          fi
          
          if [ -n "${{ secrets.DB_NAME }}" ]; then
            echo "✅ DB_NAME is SET"
          else
            echo "❌ DB_NAME is NOT SET"
          fi
          
          if [ -n "${{ secrets.DB_PORT }}" ]; then
            echo "✅ DB_PORT is SET"
          else
            echo "❌ DB_PORT is NOT SET (will use default 3306)"
          fi
          
          if [ -n "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "✅ SERVER_SSH_KEY is SET"
          else
            echo "❌ SERVER_SSH_KEY is NOT SET"
          fi
          
          echo ""
          echo "=== Testing DB_HOST format ==="
          # Check if DB_HOST looks like an RDS endpoint
          if [[ "${{ secrets.DB_HOST }}" == *".rds.amazonaws.com"* ]]; then
            echo "✅ DB_HOST appears to be an RDS endpoint"
          else
            echo "⚠️  DB_HOST doesn't look like an RDS endpoint"
            echo "   Expected format: xxx.rds.amazonaws.com"
          fi
        env:
          DB_HOST_VALUE: ${{ secrets.DB_HOST }}